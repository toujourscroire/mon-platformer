<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlatformerGame 🎮</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #game-title {
      color: #e0e0ff;
      font-size: clamp(14px, 2.5vw, 22px);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 0 12px #7c83fd88;
    }

    #game-container {
      border: 3px solid #7c83fd55;
      border-radius: 8px;
      box-shadow: 0 0 40px #7c83fd33;
      overflow: hidden;
    }

    canvas { display: block; }

    #controls-hint {
      color: #9999bb;
      font-size: clamp(10px, 1.5vw, 13px);
      margin-top: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div id="game-title">🎮 PlatformerGame</div>
  <div id="game-container"></div>
  <div id="controls-hint">
    ← → Courir &nbsp;|&nbsp; ESPACE Sauter &nbsp;|&nbsp; R Restart
  </div>

  <!-- Phaser 3 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <!-- Logique du jeu -->
  <script src="main.js"></script>

</body>
</html>
